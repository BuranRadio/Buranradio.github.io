<!DOCTYPE html>
<html>
<head>

<title>Buran Radio</title>

<style>

body{
background:#0e0e0e;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#c40000;
padding:40px;
font-size:40px;
font-weight:bold;
}

.container{
margin-top:100px;
}

.listen{
display:inline-block;
background:#ff2d2d;
color:white;
padding:20px 40px;
font-size:26px;
border-radius:10px;
text-decoration:none;
}

.nowplaying{
margin-top:40px;
font-size:22px;
}

</style>

</head>

<body>

<header>
💉 BURAN RADIO 🔊
</header>

<div class="container">

<h2>Direktesending</h2>

<a class="listen" href="http://buranradio.ddns.net:8000/stream" target="_blank">
▶ Lytt Live
</a>

<div class="nowplaying">
Nå spilles: <span id="song">Laster...</span>
</div>

</div>

<script>

async function getSong() {

try {

let response = await fetch("http://buranradio.ddns.net:8000/status-json.xsl");
let data = await response.json();

let song = data.icestats.source.title;

document.getElementById("song").textContent = song;

} catch {
document.getElementById("song").textContent = "Ingen info";
}

}

getSong();
setInterval(getSong, 10000);

</script>

</body>
</html>
