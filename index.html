<!DOCTYPE html>
<html>
<head>

<title>Buran Radio</title>

<style>

body{
background:#0e0e0e;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#c40000;
padding:40px;
font-size:40px;
font-weight:bold;
}

.container{
margin-top:60px;
}

.listen{
display:inline-block;
background:#ff2d2d;
color:white;
padding:20px 40px;
font-size:26px;
border-radius:10px;
text-decoration:none;
margin-top:30px;
}

.listen:hover{
background:#ff0000;
}

img{
width:300px;
border-radius:15px;
margin-top:30px;
}

.live{
margin-top:30px;
font-size:24px;
}

.dot{
height:16px;
width:16px;
background:red;
border-radius:50%;
display:inline-block;
margin-right:10px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}

</style>

</head>

<body>

<header>
💉 BURAN RADIO 🔊
</header>

<div class="container">

<img src="buran.jpg" alt="Buran Radio" class="radioimg">
  
<div class="live">
<span class="dot"></span>
<strong>LIVE — DJ Balkan spiller</strong>
</div>

<br>

<a class="listen" href="http://buranradio.ddns.net:8000/stream" target="_blank">
▶ Lytt Live
</a>


  
</div>
<h2> Ønsk en sang</h2>

<form id="songForm">
<input type="text" id="name" placeholder="Navn" required><br>
<input type="text" id="song" placeholder="Sang" required><br>
<input type="text" id="artist" placeholder="Artist" required><br>
<textarea id="message" placeholder="Hilsen"></textarea><br>
<button type="submit">Send ønskesang</button>
</form>

<script>
const scriptURL = https://script.google.com/macros/s/AKfycbyU4cf3duuHg0prvs_VJ2uEmFCWP2VIYgDt5UgTprgUA3VTbgd6Lk8Y-lTqRNL8rhe9/exec;

document.getElementById("songForm").addEventListener("submit", e => {
 e.preventDefault();

 const data = {
   name: document.getElementById("name").value,
   song: document.getElementById("song").value,
   artist: document.getElementById("artist").value,
   message: document.getElementById("message").value
 };

 fetch(scriptURL, {
   method: "POST",
   body: JSON.stringify(data)
 }).then(() => {
   alert("Ønsket ditt er sendt til radioen!");
   document.getElementById("songForm").reset();
 });
});
</script>

</body>
</html>
